# =============================================================================
# AuraDev ERP Auth — Application Configuration
# =============================================================================

spring.config.import=optional:file:.env[.properties]

spring.application.name=auradev-erp

# --- PostgreSQL (Supabase) ---------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# --- JPA / Hibernate ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.use_server_prepared_statements=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# --- Flyway ------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# --- Jackson -----------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# --- Server ------------------------------------------------------------------
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never

# --- Actuator ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# --- OpenAPI -----------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.info.title=AuraDev ERP API
springdoc.info.version=v1
springdoc.info.description=Auth, products, categories, inventory

# --- JWT ---------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# --- CORS --------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- Uploads -----------------------------------------------------------------
app.uploads.dir=${APP_UPLOADS_DIR:uploads}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

# --- Logging -----------------------------------------------------------------
logging.level.root=INFO
logging.level.com.auradev.erp=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
